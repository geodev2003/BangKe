name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull & rebuild
        shell: cmd
        run: |
          git config --global --add safe.directory D:/Code/final
          cd /d D:\Code\final && git pull origin main && docker-compose up -d --build && echo Deploy completed!